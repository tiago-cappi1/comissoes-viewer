<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comissões – Clean Environment Brasil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;height:100vh;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;font-size:13px;overflow:hidden}
#sb{width:210px;min-width:210px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column}
#sbh{padding:14px;border-bottom:1px solid #334155}
#sbh h1{font-size:14px;font-weight:700;color:#38bdf8}
#sbh p{font-size:10px;color:#475569;margin-top:3px}
#tl{overflow-y:auto;flex:1}
.tb{display:flex;align-items:center;width:100%;padding:9px 14px;background:none;border:none;border-left:3px solid transparent;color:#94a3b8;cursor:pointer;text-align:left;font-size:12px}
.tb:hover{background:#0f172a;color:#cbd5e1}
.tb.on{background:#0f172a;border-left-color:#38bdf8;color:#e2e8f0;font-weight:600}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#bar{padding:10px 18px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;background:#1e293b;flex-shrink:0}
#bi h2{font-size:14px;font-weight:700;color:#f1f5f9}
#bi p{font-size:11px;color:#64748b;margin-top:2px}
#br{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{background:#334155;border:none;color:#e2e8f0;border-radius:5px;padding:4px 11px;cursor:pointer;font-size:12px}
.btn:hover{background:#475569}
.br2{background:#ef4444}.br2:hover{background:#dc2626}
#ld{display:none;color:#38bdf8;font-size:12px}
#tw{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10}
.thl th{background:#1e293b;padding:6px 10px;text-align:left;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #334155;white-space:nowrap}
.thf th{background:#162032;padding:3px 6px;border-bottom:2px solid #334155}
input.f{width:100%;background:#0f172a;border:1px solid #334155;border-radius:3px;padding:3px 5px;color:#e2e8f0;font-size:11px;outline:none;min-width:50px}
input.f:focus{border-color:#38bdf8}
select.fd{width:100%;background:#0f172a;border:1px solid #334155;border-radius:3px;padding:3px 4px;color:#e2e8f0;font-size:11px;outline:none;cursor:pointer}
select.fd:focus{border-color:#38bdf8}
select.fd option:disabled{color:#475569;font-style:italic}
.ftog{display:flex;gap:2px}
.ftog button{flex:1;padding:2px 3px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:3px;cursor:pointer;font-size:10px;white-space:nowrap}
.ftog button.on{background:#1e3a5f;color:#38bdf8;border-color:#38bdf8}
.frange{display:flex;gap:3px;align-items:center}
.frange input{width:58px;background:#0f172a;border:1px solid #334155;border-radius:3px;padding:2px 4px;color:#e2e8f0;font-size:10px;outline:none}
.frange input:focus{border-color:#38bdf8}
.frange span{color:#475569;font-size:10px}
tbody tr:nth-child(even){background:#111827}
tbody tr:nth-child(odd){background:#0f172a}
tbody tr:hover{background:#1e3a5f}
td{padding:5px 10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1;border-bottom:1px solid #1e293b}
.nl{color:#475569;font-style:italic}.bt{color:#22c55e}.bf{color:#ef4444}.nm{color:#7dd3fc}
#pg{padding:8px 18px;border-top:1px solid #334155;background:#1e293b;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
#msg{padding:40px;text-align:center;color:#64748b;font-size:14px}
.facet-loading select.fd{opacity:.5}
</style>
</head>
<body>
<div id="sb">
  <div id="sbh"><h1>comissoes</h1><p>Clean Environment Brasil</p></div>
  <div id="tl">
    <button class="tb" data-t="params">Parâmetros</button>
    <button class="tb" data-t="cargos">Cargos</button>
    <button class="tb" data-t="colaboradores">Colaboradores</button>
    <button class="tb" data-t="pesos_metas">Pesos Metas</button>
    <button class="tb" data-t="fc_escada_cargos">FC Escada</button>
    <button class="tb" data-t="cross_selling">Cross Selling</button>
    <button class="tb" data-t="aliases">Aliases</button>
    <button class="tb" data-t="metas_individuais">Metas Indiv.</button>
    <button class="tb" data-t="metas_aplicacao">Metas Aplic.</button>
    <button class="tb" data-t="meta_rentabilidade">Meta Rent.</button>
    <button class="tb" data-t="metas_fornecedores">Metas Forn.</button>
    <button class="tb" data-t="monthly_avg_rates">Taxas</button>
    <button class="tb" data-t="enum_tipo_meta">Enum Meta</button>
    <button class="tb" data-t="config_comissao">Config Comissão</button>
    <button class="tb" data-t="classificacao-produtos">Classif. Produtos</button>
  </div>
</div>
<div id="main">
  <div id="bar">
    <div id="bi"><h2 id="ttl">Selecione uma tabela</h2><p id="sub"></p></div>
    <div id="br">
      <span id="ld">&#8635; carregando&#8230;</span>
      <button class="btn" onclick="reload()">&#8635; Atualizar</button>
      <button class="btn br2" id="bc" onclick="cf()" style="display:none">&#10005; Limpar filtros</button>
    </div>
  </div>
  <div id="tw"><div id="msg">&#8592; Selecione uma tabela</div></div>
  <div id="pg" style="display:none"></div>
</div>

<script>
var API = 'https://zkpwdufnvktwoqwbpfdk.supabase.co/functions/v1/comissoes-viewer';
var PS = 200;
var S = { t:'', p:0, f:{}, tot:0, cols:[], meta:{} };
var SCHEMA_CACHE = {};
var facetTimer = null;

document.querySelectorAll('.tb').forEach(function(b){
  b.addEventListener('click', function(){
    S = { t:b.dataset.t, p:0, f:{}, tot:0, cols:[], meta:{} };
    document.querySelectorAll('.tb').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    document.getElementById('ttl').textContent = b.textContent.trim();
    document.getElementById('bc').style.display = 'none';
    loadSchema(S.t, function(){ go(); });
  });
});

// ── Schema loading ──────────────────────────────────────────────
function loadSchema(t, cb) {
  if (SCHEMA_CACHE[t]) { S.meta = SCHEMA_CACHE[t]; cb(); return; }
  fetch(API + '/schema?table=' + encodeURIComponent(t))
    .then(function(r){ return r.json(); })
    .then(function(j){
      SCHEMA_CACHE[t] = j;
      S.meta = j;
      cb();
    })
    .catch(function(){ S.meta = {}; cb(); });
}

// ── Build facet query params from current filters ───────────────
function facetParams() {
  var p = new URLSearchParams({ table: S.t });
  Object.keys(S.f).forEach(function(k){
    var v = S.f[k];
    if (!v || v === '__all__') return;
    if (typeof v === 'object') {
      if (v.min !== '' && v.min !== undefined) p.append(k, '__min:' + v.min);
      if (v.max !== '' && v.max !== undefined) p.append(k, '__max:' + v.max);
    } else {
      p.set(k, v);
    }
  });
  return p;
}

// ── Refresh all dropdown options based on current filters ───────
function refreshFacets() {
  clearTimeout(facetTimer);
  facetTimer = setTimeout(function(){
    var p = facetParams();
    // Mark dropdowns as loading
    document.querySelectorAll('select.fd').forEach(function(s){ s.closest('th').classList.add('facet-loading'); });
    fetch(API + '/facets?' + p)
      .then(function(r){ return r.json(); })
      .then(function(facets){
        document.querySelectorAll('select.fd').forEach(function(sel){
          var col = sel.dataset.c;
          if (!facets[col]) return;
          var cur = S.f[col] || '';
          var newVals = facets[col];
          // Rebuild options
          var opts = '<option value="">Todos</option>';
          newVals.forEach(function(v){
            var label = String(v);
            var disabled = false; // all returned values are valid
            opts += '<option value="' + e(label) + '"' + (cur === label ? ' selected' : '') + '>' + e(label) + '</option>';
          });
          // If current selection no longer exists, clear it
          if (cur && newVals.indexOf(cur) === -1) {
            S.f[col] = '';
            opts = opts.replace(' selected', '');
            // Re-insert Todos as selected
            opts = opts.replace('<option value="">Todos</option>', '<option value="" selected>Todos</option>');
          }
          sel.innerHTML = opts;
          sel.closest('th').classList.remove('facet-loading');
        });
      })
      .catch(function(){
        document.querySelectorAll('th.facet-loading').forEach(function(th){ th.classList.remove('facet-loading'); });
      });
  }, 150);
}

// ── Main data fetch ─────────────────────────────────────────────
function go() {
  if (!S.t) return;
  document.getElementById('ld').style.display = 'inline';
  var p = new URLSearchParams({ table: S.t, limit: PS, offset: S.p * PS });
  Object.keys(S.f).forEach(function(k){
    var v = S.f[k];
    if (!v || v === '__all__') return;
    if (v === '__true__' || v === '__false__') return; // client-side
    if (typeof v === 'object') {
      if (v.min !== '' && v.min !== undefined) p.append(k, '__min:' + v.min);
      if (v.max !== '' && v.max !== undefined) p.append(k, '__max:' + v.max);
      return;
    }
    p.set(k, v);
  });
  fetch(API + '/api?' + p)
    .then(function(r){ return r.json(); })
    .then(function(j){
      document.getElementById('ld').style.display = 'none';
      if (j.error) { document.getElementById('tw').innerHTML = '<div id="msg" style="color:#ef4444">Erro: '+j.error+'</div>'; return; }
      S.tot = j.count || 0;
      S.cols = j.data && j.data.length ? Object.keys(j.data[0]) : [];
      // Client-side boolean filter
      var rows = (j.data||[]).filter(function(row){
        return Object.keys(S.f).every(function(k){
          var v = S.f[k];
          if (!v || v === '__all__') return true;
          if (v === '__true__') return row[k] === true;
          if (v === '__false__') return row[k] === false;
          return true;
        });
      });
      draw(rows, j.count);
      // After drawing, refresh facets
      refreshFacets();
    })
    .catch(function(e2){
      document.getElementById('ld').style.display = 'none';
      document.getElementById('tw').innerHTML = '<div id="msg" style="color:#ef4444">'+e2.message+'</div>';
    });
}

function reload() { go(); }

// ── Render table + smart filters ────────────────────────────────
function draw(rows, serverCount) {
  var af = Object.keys(S.f).filter(function(k){
    var v = S.f[k];
    if (!v || v === '__all__') return false;
    if (typeof v === 'object') return (v.min !== ''&&v.min!==undefined)||(v.max!==''&&v.max!==undefined);
    return true;
  }).length;

  document.getElementById('bc').style.display = af ? 'inline-block' : 'none';
  document.getElementById('sub').textContent = 'comissoes.'+S.t+' · '+(serverCount||0).toLocaleString('pt-BR')+' registros'+(af?' (filtrado)':'');

  if (!rows.length) {
    document.getElementById('tw').innerHTML = '<div id="msg">Nenhum resultado.</div>';
    document.getElementById('pg').style.display = 'none';
    return;
  }

  var h1 = S.cols.map(function(c){ return '<th>'+e(c)+'</th>'; }).join('');
  var h2 = S.cols.map(function(c){ return '<th>'+renderFilter(c)+'</th>'; }).join('');
  var tb = rows.map(function(row){
    return '<tr>'+S.cols.map(function(c){
      var v = row[c];
      if (v===null||v===undefined) return '<td><span class="nl">null</span></td>';
      if (typeof v==='boolean') return '<td><span class="b'+(v?'t':'f')+'">'+(v?'✓':'✗')+'</span></td>';
      if (typeof v==='number') return '<td class="nm">'+v.toLocaleString('pt-BR')+'</td>';
      return '<td title="'+e(String(v))+'">'+e(String(v))+'</td>';
    }).join('')+'</tr>';
  }).join('');

  document.getElementById('tw').innerHTML =
    '<table><thead><tr class="thl">'+h1+'</tr><tr class="thf">'+h2+'</tr></thead><tbody>'+tb+'</tbody></table>';

  bindFilters();

  var tp = Math.ceil((serverCount||0)/PS);
  var pg = document.getElementById('pg');
  if (tp>1){
    pg.style.display='flex';
    pg.innerHTML = pb('«',0,S.p===0)+pb('‹',S.p-1,S.p===0)
      +'<span style="color:#94a3b8;font-size:12px">Pág '+(S.p+1)+'/'+tp+'</span>'
      +pb('›',S.p+1,S.p>=tp-1)+pb('»',tp-1,S.p>=tp-1)
      +'<span style="color:#64748b;font-size:11px;margin-left:8px">'
      +((S.p*PS+1).toLocaleString('pt-BR'))+'–'+(Math.min((S.p+1)*PS,serverCount||0).toLocaleString('pt-BR'))
      +' de '+(serverCount||0).toLocaleString('pt-BR')+'</span>';
    pg.querySelectorAll('.pb').forEach(function(b2){
      b2.addEventListener('click', function(){ S.p=parseInt(b2.dataset.p); go(); });
    });
  } else { pg.style.display='none'; }
}

// ── Render a single filter cell ─────────────────────────────────
function renderFilter(col) {
  var m = S.meta[col] || { type:'text' };
  var cur = S.f[col];

  if (m.type === 'boolean') {
    var bv = cur || '__all__';
    return '<div class="ftog">'
      +'<button class="'+(bv==='__all__'?'on':'')+'" data-c="'+e(col)+'" data-v="__all__">Todos</button>'
      +'<button class="'+(bv==='__true__'?'on':'')+'" data-c="'+e(col)+'" data-v="__true__">Sim</button>'
      +'<button class="'+(bv==='__false__'?'on':'')+'" data-c="'+e(col)+'" data-v="__false__">Não</button>'
      +'</div>';
  }

  if (m.type === 'range') {
    var rv = (typeof cur==='object' && cur) ? cur : {min:'',max:''};
    return '<div class="frange">'
      +'<input type="number" class="fr" data-c="'+e(col)+'" data-r="min" placeholder="mín" value="'+e(String(rv.min||''))+'">'
      +'<span>–</span>'
      +'<input type="number" class="fr" data-c="'+e(col)+'" data-r="max" placeholder="máx" value="'+e(String(rv.max||''))+'">'
      +'</div>';
  }

  if (m.type === 'dropdown') {
    var vals = m.values || [];
    var sv = String(cur||'');
    var opts = '<option value="">Todos</option>'
      + vals.map(function(v){
          return '<option value="'+e(String(v))+'"'+(sv===String(v)?' selected':'')+'>'+e(String(v))+'</option>';
        }).join('');
    return '<select class="fd" data-c="'+e(col)+'">'+opts+'</select>';
  }

  // text
  return '<input class="f" data-c="'+e(col)+'" value="'+e(String(cur||''))+'" placeholder="filtrar…">';
}

// ── Bind all filter event listeners ─────────────────────────────
function bindFilters() {
  document.querySelectorAll('input.f').forEach(function(i){
    i.addEventListener('input', function(x){
      S.f[x.target.dataset.c] = x.target.value;
      S.p = 0;
      go();
    });
  });
  document.querySelectorAll('select.fd').forEach(function(sel){
    sel.addEventListener('change', function(x){
      S.f[x.target.dataset.c] = x.target.value;
      S.p = 0;
      go();
    });
  });
  document.querySelectorAll('.ftog button').forEach(function(b){
    b.addEventListener('click', function(){
      S.f[b.dataset.c] = b.dataset.v;
      S.p = 0;
      go();
    });
  });
  document.querySelectorAll('input.fr').forEach(function(i){
    i.addEventListener('input', function(x){
      var col = x.target.dataset.c;
      var side = x.target.dataset.r;
      if (!S.f[col]||typeof S.f[col]!=='object') S.f[col]={min:'',max:''};
      S.f[col][side] = x.target.value;
      S.p = 0;
      go();
    });
  });
}

function pb(l,p,d){ return '<button class="btn pb" data-p="'+p+'"'+(d?' disabled style="opacity:.4"':'')+'>'+l+'</button>'; }
function e(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cf(){ S.f={}; S.p=0; go(); }
</script>
</body>
</html>
