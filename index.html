<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comissões – Clean Environment Brasil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{display:flex;height:100vh;background:#0f172a;color:#e2e8f0;font-family:system-ui,sans-serif;font-size:13px;overflow:hidden}#sb{width:205px;min-width:205px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column}#sbh{padding:14px;border-bottom:1px solid #334155}#sbh h1{font-size:14px;font-weight:700;color:#38bdf8}#sbh p{font-size:10px;color:#475569;margin-top:3px}#tl{overflow-y:auto;flex:1}.tb{display:flex;align-items:center;width:100%;padding:9px 14px;background:none;border:none;border-left:3px solid transparent;color:#94a3b8;cursor:pointer;text-align:left;font-size:12px}.tb:hover{background:#0f172a;color:#cbd5e1}.tb.on{background:#0f172a;border-left-color:#38bdf8;color:#e2e8f0;font-weight:600}#main{flex:1;display:flex;flex-direction:column;overflow:hidden}#bar{padding:10px 18px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;background:#1e293b}#bi h2{font-size:14px;font-weight:700;color:#f1f5f9}#bi p{font-size:11px;color:#64748b;margin-top:2px}#br{margin-left:auto;display:flex;gap:8px;align-items:center}.btn{background:#334155;border:none;color:#e2e8f0;border-radius:5px;padding:4px 11px;cursor:pointer;font-size:12px}.btn:hover{background:#475569}.br2{background:#ef4444}.br2:hover{background:#dc2626}#ld{display:none;color:#38bdf8;font-size:12px}#tw{flex:1;overflow:auto}table{width:100%;border-collapse:collapse}thead{position:sticky;top:0;z-index:10}.thl th{background:#1e293b;padding:7px 11px;text-align:left;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #334155;white-space:nowrap}.thf th{background:#162032;padding:3px 7px;border-bottom:2px solid #334155}input.f{width:100%;background:#0f172a;border:1px solid #334155;border-radius:3px;padding:3px 5px;color:#e2e8f0;font-size:11px;outline:none;min-width:50px}input.f:focus{border-color:#38bdf8}tbody tr:nth-child(even){background:#111827}tbody tr:nth-child(odd){background:#0f172a}tbody tr:hover{background:#1e3a5f}td{padding:5px 11px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1;border-bottom:1px solid #1e293b}.nl{color:#94a3b8;font-style:italic}.bt{color:#22c55e}.bf{color:#ef4444}.nm{color:#7dd3fc}#pg{padding:8px 18px;border-top:1px solid #334155;background:#1e293b;display:flex;align-items:center;gap:6px;flex-wrap:wrap}#msg{padding:40px;text-align:center;color:#64748b;font-size:14px}
</style>
</head>
<body>
<div id="sb"><div id="sbh"><h1>comissoes</h1><p>Clean Environment Brasil</p></div><div id="tl"><button class="tb" data-t="params">Parâmetros</button><button class="tb" data-t="cargos">Cargos</button><button class="tb" data-t="colaboradores">Colaboradores</button><button class="tb" data-t="pesos_metas">Pesos Metas</button><button class="tb" data-t="fc_escada_cargos">FC Escada</button><button class="tb" data-t="cross_selling">Cross Selling</button><button class="tb" data-t="aliases">Aliases</button><button class="tb" data-t="metas_individuais">Metas Indiv.</button><button class="tb" data-t="metas_aplicacao">Metas Aplic.</button><button class="tb" data-t="meta_rentabilidade">Meta Rent.</button><button class="tb" data-t="metas_fornecedores">Metas Forn.</button><button class="tb" data-t="monthly_avg_rates">Taxas</button><button class="tb" data-t="enum_tipo_meta">Enum Meta</button><button class="tb" data-t="config_comissao">Config Comissão</button><button class="tb" data-t="classificacao-produtos">Classif. Produtos</button></div></div>
<div id="main">
  <div id="bar"><div id="bi"><h2 id="ttl">Selecione uma tabela</h2><p id="sub"></p></div><div id="br"><span id="ld">&#8635; carregando&#8230;</span><button class="btn" onclick="go()">&#8635; Atualizar</button><button class="btn br2" id="bc" onclick="cf()" style="display:none">&#10005; Limpar</button></div></div>
  <div id="tw"><div id="msg">&#8592; Selecione uma tabela</div></div>
  <div id="pg" style="display:none"></div>
</div>
<script>
var API='https://zkpwdufnvktwoqwbpfdk.supabase.co/functions/v1/comissoes-viewer',PS=200,S={t:'',p:0,f:{},tot:0,cols:[]};
document.querySelectorAll('.tb').forEach(function(b){b.addEventListener('click',function(){S={t:b.dataset.t,p:0,f:{},tot:0,cols:[]};document.querySelectorAll('.tb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');document.getElementById('ttl').textContent=b.textContent;document.getElementById('bc').style.display='none';go();});});
function go(){if(!S.t)return;document.getElementById('ld').style.display='inline';var p=new URLSearchParams({table:S.t,limit:PS,offset:S.p*PS});Object.keys(S.f).forEach(function(k){if(S.f[k]&&S.f[k].trim())p.set(k,S.f[k]);});fetch(API+'?'+p).then(function(r){return r.json();}).then(function(j){document.getElementById('ld').style.display='none';if(j.error){document.getElementById('tw').innerHTML='<div id="msg" style="color:#ef4444">Erro: '+j.error+'</div>';return;}S.tot=j.count||0;S.cols=j.data&&j.data.length?Object.keys(j.data[0]):[];draw(j.data||[]);}).catch(function(e){document.getElementById('ld').style.display='none';document.getElementById('tw').innerHTML='<div id="msg" style="color:#ef4444">'+e.message+'</div>';});}
function draw(rows){var af=Object.keys(S.f).filter(function(k){return S.f[k]&&S.f[k].trim();}).length;document.getElementById('bc').style.display=af?'inline-block':'none';document.getElementById('sub').textContent='comissoes.'+S.t+' · '+S.tot.toLocaleString('pt-BR')+' registros'+(af?' (filtrado)':'');if(!rows.length){document.getElementById('tw').innerHTML='<div id="msg">Nenhum resultado.</div>';document.getElementById('pg').style.display='none';return;}var h1=S.cols.map(function(c){return'<th>'+e(c)+'</th>';}).join('');var h2=S.cols.map(function(c){return'<th><input class="f" data-c="'+e(c)+'" value="'+e(S.f[c]||'')+'"></th>';}).join('');var tb=rows.map(function(row){return'<tr>'+S.cols.map(function(c){var v=row[c];if(v===null||v===undefined)return'<td><span class="nl">null</span></td>';if(typeof v==='boolean')return'<td><span class="b'+(v?'t':'f')+'">'+(v?'✓':'✗')+'</span></td>';if(typeof v==='number')return'<td class="nm">'+v.toLocaleString('pt-BR')+'</td>';return'<td title="'+e(String(v))+'">'+e(String(v))+'</td>';}).join('')+'</tr>';}).join('');document.getElementById('tw').innerHTML='<table><thead><tr class="thl">'+h1+'</tr><tr class="thf">'+h2+'</tr></thead><tbody>'+tb+'</tbody></table>';document.querySelectorAll('input.f').forEach(function(i){i.addEventListener('input',function(x){S.f[x.target.dataset.c]=x.target.value;S.p=0;go();});});var tp=Math.ceil(S.tot/PS),pg=document.getElementById('pg');if(tp>1){pg.style.display='flex';pg.innerHTML=pb('«',0,S.p===0)+pb('‹',S.p-1,S.p===0)+'<span style="color:#94a3b8;font-size:12px">Pág '+(S.p+1)+'/'+tp+'</span>'+pb('›',S.p+1,S.p>=tp-1)+pb('»',tp-1,S.p>=tp-1)+'<span style="color:#64748b;font-size:11px;margin-left:8px">'+((S.p*PS+1).toLocaleString('pt-BR'))+'–'+(Math.min((S.p+1)*PS,S.tot).toLocaleString('pt-BR'))+' de '+S.tot.toLocaleString('pt-BR')+'</span>';pg.querySelectorAll('.pb').forEach(function(b){b.addEventListener('click',function(){S.p=parseInt(b.dataset.p);go();});});}else{pg.style.display='none';}}
function pb(l,p,d){return'<button class="btn pb" data-p="'+p+'"'+(d?' disabled style="opacity:.4"':'')+'>'+l+'</button>';}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cf(){S.f={};S.p=0;go();}
</script>
</body>
</html>
